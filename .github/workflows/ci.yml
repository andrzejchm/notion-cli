name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Typecheck, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ci

  integration:
    name: Integration tests
    needs: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration
        env:
          NOTION_TEST_TOKEN: ${{ secrets.NOTION_TEST_TOKEN }}
          NOTION_TEST_ROOT_PAGE_ID: ${{ secrets.NOTION_TEST_ROOT_PAGE_ID }}
          NOTION_FIXTURE_RICH_PAGE_ID: ${{ secrets.NOTION_FIXTURE_RICH_PAGE_ID }}
          NOTION_FIXTURE_SIMPLE_PAGE_ID: ${{ secrets.NOTION_FIXTURE_SIMPLE_PAGE_ID }}
          NOTION_FIXTURE_EMPTY_PAGE_ID: ${{ secrets.NOTION_FIXTURE_EMPTY_PAGE_ID }}
          NOTION_FIXTURE_TASK_DB_ID: ${{ secrets.NOTION_FIXTURE_TASK_DB_ID }}
          NOTION_FIXTURE_EMPTY_DB_ID: ${{ secrets.NOTION_FIXTURE_EMPTY_DB_ID }}
          NOTION_FIXTURE_COMMENTS_PAGE_ID: ${{ secrets.NOTION_FIXTURE_COMMENTS_PAGE_ID }}
